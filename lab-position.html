<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB: CSS Position Çalışması</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 150vh; 
        }

        header {
            margin-top: 20px;
            text-align: center;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            z-index: 1000;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .back-button:hover {
            background-color: #0056b3;
            transform: scale(1.1);
            cursor: move;
        }

        .event-card {
            position: relative; 
            width: 400px;
            height: 250px;
            background-color: white;
            border: 2px solid #333;
            margin-top: 100px;
            padding: 20px;
            box-shadow: 10px 10px 0px #333;
        }

        .event-card h2 {
            margin-top: 40px;
            color: #2c3e50;
        }

        
        .tag-free {
            position: absolute;
            top: -15px;
            left: -15px;
            background-color: #ffc107;
            padding: 5px 10px;
            border: 2px solid #333;
            font-weight: bold;
            cursor: help;
            z-index: 10;
        }

        .date-box {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #e8f5e9;
            border: 1px dashed #2e7d32;
            padding: 5px;
            font-size: 0.9em;
            cursor: crosshair;
        }

        .location-info {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: #fce4ec;
            padding: 8px;
            border-left: 5px solid #d81b60;
            font-size: 0.85em;
            animation: bounce 2s infinite;
        }

        .decor-circle {
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background-color: rgba(0, 123, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .helper-menu {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #6f42c1;
            color: white;
            padding: 15px;
            border-radius: 50px;
            font-size: 14px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-button">Ana Sayfaya Dön</a>

    <header>
        <h1>LAB: Position Uygulaması</h1>
        <p>CSS Konumlandırma Özellikleri Test Sayfası</p>
    </header>

    <div class="event-card">
        <div class="tag-free">Ücretsiz</div>
        <div class="date-box">25 Nisan 2026</div>
        
        <h2>Veritabanı Semineri</h2>
        <p>Üniversitemiz öğrencileri için temel seviye veritabanı sistemleri semineri.</p>
        
        <div class="location-info">Konum: T4 Binası</div>
        
        <div class="decor-circle"></div>
    </div>

    <div class="helper-menu">
        Destek Hattı
    </div>

    <footer>
        2026 - LAB Position Örnek Çalışması | Furkan Adıgüzel
    </footer>

</body>
</html>
